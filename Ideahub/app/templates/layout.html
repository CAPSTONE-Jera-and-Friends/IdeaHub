<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>{% block title %}IdeaHub POS{% endblock %}</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- Custom CSS -->
<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>

<!-- TOP NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm px-4">

    <a class="navbar-brand fw-bold text-warning" href="#">IdeaHub POS</a>

    <div class="ms-auto">

        <a class="nav-link d-inline me-3" href="#">Orders</a>
        <a class="nav-link d-inline me-3" href="#">Sales</a>
        <a class="nav-link d-inline" href="#">Profile</a>

    </div>

</nav>

<div class="d-flex">

    <!-- SIDEBAR -->
    <div class="sidebar p-3">

        <h6 class="text-muted mb-3">Spaces</h6>

                    <button class="btn w-100 text-start mb-2 sidebar-btn active" onclick="setFilter('Regular Lounge', this)">
                Regular
            </button>

            <button class="btn w-100 text-start mb-2 sidebar-btn" onclick="setFilter('Premium Lounge', this)">
                Premium
            </button>

            <button class="btn w-100 text-start sidebar-btn" onclick="window.location.href='/boardroom'">
                Boardroom
            </button>

    </div>

    <!-- MAIN CONTENT -->
    <div class="content p-4 w-100">

        {% block content %}
        {% endblock %}

    </div>

</div>


{% block scripts %}
{% endblock %}

</body>

</html>
