{% extends "layout.html" %}

{% block title %}Orders{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h3 class="mb-0">Student Orders</h3>
      <small id="orders-subtitle" class="text-muted"></small>
    </div>
    <a class="btn btn-secondary btn-sm" href="/orders">Back</a>
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Item</th>
            <th>Qty</th>
            <th>Price</th>
            <th>Status</th>
            <th>Action</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="orders-view-container">
          <tr><td colspan="6" class="text-center text-muted py-4">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <div class="mt-3 text-end">
    <h5 class="mb-0">Food Total: ₱<span id="orders-food-total">0.00</span></h5>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
const sessionId = parseInt("{{ session_id }}");

function loadOrders() {
  fetch(`/api/session-orders/${sessionId}`, { credentials: "include" })
    .then(res => res.json())
    .then(data => {
      const subtitle = document.getElementById("orders-subtitle");
      subtitle.innerText = data.customer_name
        ? `${data.customer_name} • ${data.space_type || "N/A"} • ${data.time_in || ""}`
        : `Session ${sessionId}`;

      const container = document.getElementById("orders-view-container");

      if (!data.orders || !data.orders.length) {
        container.innerHTML = `<tr><td colspan="6" class="text-center text-muted py-4">No orders found.</td></tr>`;
        document.getElementById("orders-food-total").innerText = "0.00";
        return;
      }

      container.innerHTML = data.orders.map(item => `
        <tr>
          <td>${item.item_name}</td>
          <td>${item.quantity}</td>
          <td>₱${item.price.toFixed(2)}</td>
          <td>${item.order_status === "preparin" ? "preparing" : (item.order_status || "preparing")}</td>
          <td>
            ${(item.order_status === "preparin" || item.order_status === "preparing")
              ? `<button class="btn btn-sm btn-success" onclick="setServing(${item.order_id})">Serve</button>`
              : (item.order_status === "serving"
                  ? `<button class="btn btn-sm btn-primary" onclick="setDone(${item.order_id})">Done</button>`
                  : `—`
                )
            }
          </td>
          <td>₱${item.total.toFixed(2)}</td>
        </tr>
      `).join("");

      document.getElementById("orders-food-total").innerText = data.food_total.toFixed(2);
    })
    .catch(err => {
      showToast("Failed to load orders. Please try again.", "error");
    });
}

function setServing(orderId) {
  fetch(`/api/order-status/${orderId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ status: "serving" })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      showToast(data.error, "error");
      return;
    }
    showToast("Order status updated to serving.", "success");
    loadOrders();
  })
  .catch(err => {
    showToast("Failed to update order status. Please try again.", "error");
  });
}

function setDone(orderId) {
  fetch(`/api/order-status/${orderId}`, {
    method: "PUT",
    headers: { "Content-Type": "application/json" },
    credentials: "include",
    body: JSON.stringify({ status: "done" })
  })
  .then(res => res.json())
  .then(data => {
    if (data.error) {
      showToast(data.error, "error");
      return;
    }
    showToast("Order marked as done.", "success");
    loadOrders();
  })
  .catch(err => {
    showToast("Failed to update order status. Please try again.", "error");
  });
}

loadOrders();
</script>
{% endblock %}
