{% extends "layout.html" %}

{% block title %}Checkout Records{% endblock %}

{% block content %}
<div class="container-fluid">
  <div class="d-flex justify-content-between align-items-center mb-3">
    <div>
      <h3 class="mb-0">Checkout Records</h3>
      <small id="checkout-count" class="text-muted">0 records</small>
    </div>
    <input
      type="text"
      id="checkoutSearch"
      class="form-control w-25"
      placeholder="Search customer..."
      oninput="loadCheckoutRecords()"
    >
  </div>

  <div class="card shadow-sm">
    <div class="table-responsive">
      <table class="table table-striped mb-0">
        <thead>
          <tr>
            <th>Customer</th>
            <th>Space</th>
            <th>Time In</th>
            <th>Time Out</th>
            <th>Time Spent</th>
            <th>Time Bill</th>
            <th>Food Bill</th>
            <th>Total</th>
          </tr>
        </thead>
        <tbody id="checkout-records-container">
          <tr><td colspan="8" class="text-center text-muted py-4">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
function formatTime(seconds) {
  if (seconds === null || seconds === undefined) return "N/A";
  const s = Number(seconds);
  const hrs = Math.floor(s / 3600);
  const mins = Math.floor((s % 3600) / 60);
  const secs = s % 60;
  return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
}

function loadCheckoutRecords() {
  fetch("/api/checkout-records", { credentials: "include" })
  .then(res => res.json())
  .then(data => {
    if (!Array.isArray(data)) {
      const container = document.getElementById("checkout-records-container");
      container.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Failed to load checkout records. Please refresh the page.</td></tr>`;
      return;
    }
    const search = document.getElementById("checkoutSearch").value.toLowerCase();
    const filtered = data.filter(r => r.customer_name.toLowerCase().includes(search));
    const container = document.getElementById("checkout-records-container");
    document.getElementById("checkout-count").innerText = `${filtered.length} record(s)`;

    if (!filtered.length) {
      container.innerHTML = `<tr><td colspan="8" class="text-center text-muted py-4">No checkout records found.</td></tr>`;
      return;
    }

    container.innerHTML = filtered.map(record => `
      <tr>
        <td>${record.customer_name}</td>
        <td>${record.space_type}</td>
        <td>${record.time_in}</td>
        <td>${record.time_out}</td>
        <td>${formatTime(record.seconds_spent)}</td>
        <td>₱${record.time_bill.toFixed(2)}</td>
        <td>₱${record.food_bill.toFixed(2)}</td>
        <td><strong>₱${record.total_bill.toFixed(2)}</strong></td>
      </tr>
    `).join("");
  })
  .catch(() => {
    const container = document.getElementById("checkout-records-container");
    container.innerHTML = `<tr><td colspan="8" class="text-center text-danger py-4">Failed to load checkout records. Please refresh the page.</td></tr>`;
  });
}

const socket = io();
socket.on("session_checked_out", function () {
  loadCheckoutRecords();
});

loadCheckoutRecords();
setInterval(loadCheckoutRecords, 10000);
</script>
{% endblock %}
